<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💖 Para Sara 💖</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 2;
      padding: 24px;
      box-sizing: border-box;
    }

    img {
      width: min(82vw, 620px);
      max-height: 62vh;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      display: block;
    }

    .message {
      color: white;
      text-align: center;
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      margin-top: 6px;
    }

    .heart {
      position: fixed;
      top: -12vh;
      pointer-events: none;
      user-select: none;
      z-index: 1;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: 1;
      opacity: 1;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="tequiero.jpg" alt="Sorpresa">
    <div class="message">De: Roger, Para: Sara</div>
  </div>

  <script>
    const HEART_COUNT = 40;

    for (let i = 0; i < HEART_COUNT; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = '❤️';

      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (18 + Math.random() * 26) + 'px';
      heart.style.animationDuration = (3.5 + Math.random() * 4.5) + 's';
      heart.style.animationDelay = Math.random() * 3 + 's';

      document.body.appendChild(heart);
    }
  </script>
</body>
</html>
